<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Physical Liquid Glass</title>

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        font-family: sans-serif;
      }

      .background {
        position: absolute;
        inset: 0;
        background: url('https://picsum.photos/1600/900') center/cover no-repeat;
      }

      .glass {
        position: absolute;
        top: 25%;
        left: 10%;
        width: 350px;
        height: 220px;
        border-radius: 20px;
        padding: 2rem;
        color: white;

        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.4);

        backdrop-filter: blur(8px) url(#refractionFilter);
      }

      h1 {
        margin: 0 0 1rem 0;
      }
    </style>
  </head>

  <body>
    <div class="background"></div>

    <div class="glass">
      <h1>Liquid Glass</h1>
      <p>Physically-based refraction using Snell's law approximation.</p>
    </div>

    <!-- SVG FILTER -->
    <svg width="0" height="0" style="position: absolute">
      <filter id="refractionFilter">
        <feImage id="displacementMap" result="map" />
        <feDisplacementMap in="SourceGraphic" in2="map" scale="40" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </svg>

    <script>
      /*
        Physical Refraction Displacement Generator
        -------------------------------------------
        - Creates a height field (like curved glass)
        - Computes surface normals
        - Applies simplified Snell refraction
        - Encodes displacement into RG channels
    */

      const size = 512
      const refractiveIndex = 1.5 // glass ~1.5
      const radius = size / 2
      const strength = 30

      const canvas = document.createElement('canvas')
      canvas.width = size
      canvas.height = size
      const ctx = canvas.getContext('2d')
      const imgData = ctx.createImageData(size, size)
      const data = imgData.data

      function snellRefraction(nx, ny, eta) {
        const cosI = 1
        const k = 1 - eta * eta * (1 - cosI * cosI)
        if (k < 0) return [0, 0]
        const factor = eta * cosI - Math.sqrt(k)
        return [eta * nx + factor * 0, eta * ny + factor * 0]
      }

      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          const dx = x - radius
          const dy = y - radius
          const dist = Math.sqrt(dx * dx + dy * dy)

          let height = 0

          if (dist < radius) {
            height = Math.sqrt(radius * radius - dist * dist) / radius
          }

          const nx = dx / radius
          const ny = dy / radius

          const eta = 1 / refractiveIndex
          const [rx, ry] = snellRefraction(nx, ny, eta)

          const offsetX = rx * strength
          const offsetY = ry * strength

          const index = (y * size + x) * 4

          data[index] = 128 + offsetX // R = X displacement
          data[index + 1] = 128 + offsetY // G = Y displacement
          data[index + 2] = 0
          data[index + 3] = 255
        }
      }

      ctx.putImageData(imgData, 0, 0)

      const dataURL = canvas.toDataURL()
      document.getElementById('displacementMap').setAttribute('href', dataURL)
    </script>
  </body>
</html>
